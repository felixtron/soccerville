services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soccerville
      POSTGRES_PASSWORD: soccerville
      POSTGRES_DB: soccerville
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soccerville"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://soccerville:soccerville@db:5432/soccerville
      AUTH_SECRET: ${AUTH_SECRET:-soccerville-prod-secret-change-me-32chars!}
      AUTH_URL: ${AUTH_URL:-https://soccerville.prosuite.pro}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - default
      - dokploy-network

volumes:
  postgres_data:
  uploads_data:

networks:
  dokploy-network:
    external: true
